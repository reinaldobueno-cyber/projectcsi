<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel PMO - Multsoft</title>
  <style>
    body{font-family:Inter,Arial,sans-serif;margin:0;background:#f4f7f5;color:#173b2d}
    header{background:#124d34;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
    .btn{background:#1f7a53;color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-weight:600}
    .wrap{max-width:1200px;margin:16px auto;padding:0 12px}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
    .kpi{background:#fff;border:1px solid #d9e5de;border-radius:10px;padding:12px}
    .kpi .n{font-size:24px;font-weight:800}
    .card{background:#fff;border:1px solid #d9e5de;border-radius:10px;padding:10px 12px;margin-bottom:8px}
    .muted{color:#6b7d74;font-size:12px}
    .danger{color:#b42318;font-weight:700}
    .small{font-size:12px}
    .row{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .open-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:16px;border:1px solid #1f7a53;background:#f3fbf7;color:#1f7a53;font-size:11px;font-weight:700;text-decoration:none}
    #errorBox{display:none}
  </style>
</head>
<body>
  <header>
    <div><b>PAINEL PMO</b> - MULTSOFT</div>
    <div>
      <span id="navDate" class="small" style="margin-right:8px">-</span>
      <button class="btn" onclick="loadAll(true)">Atualizar</button>
    </div>
  </header>

  <div class="wrap">
    <div id="errorBox" class="card danger"></div>

    <div class="kpis">
      <div class="kpi"><div class="muted">Projetos</div><div id="kTotal" class="n">0</div></div>
      <div class="kpi"><div class="muted">Com consultor</div><div id="kComCons" class="n">0</div></div>
      <div class="kpi"><div class="muted">Sem consultor</div><div id="kSemCons" class="n">0</div></div>
      <div class="kpi"><div class="muted">Com link projeto</div><div id="kComLink" class="n">0</div></div>
    </div>

    <section id="pProjetos">
      <div id="projetosList"></div>
    </section>

    <section id="pMetricas" style="margin-top:16px">
      <div class="row" style="margin-bottom:8px">
        <h3 style="margin:0">Métricas de Projeto (ClickUp)</h3>
        <button class="btn" onclick="_ckBuscar()">Atualizar métricas</button>
      </div>
      <div id="riscosList"></div>
      <div id="metricasList"></div>
    </section>
  </div>

  <script>
  var APPS_SCRIPT_URL_DEFAULT = 'https://script.google.com/macros/s/AKfycby3OimL5C68K40B7lt6iMHjIrDUhhXBmeM3FLZMOzHf2evn-q-_2kIDzprls44N_vjJ/exec';
  var APPS_SCRIPT_URL = (function(){
    try {
      var qs = window.location.search || '';
      var p = new URLSearchParams(qs).get('apps_script_url');
      if (p) return p;
      var raw = decodeURIComponent(qs.replace(/^\?/, ''));
      if (/script\.google\.com\/macros\/s\//i.test(raw)) {
        if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw.replace(/^\/+/, '');
        return raw;
      }
      return APPS_SCRIPT_URL_DEFAULT;
    } catch(e){ return APPS_SCRIPT_URL_DEFAULT; }
  })();

  var DATA = { projetos: [] };
  var _ckCache = {};

  function setError(msg){
    var box = document.getElementById('errorBox');
    if (!box) return;
    if (!msg) { box.style.display = 'none'; box.textContent = ''; return; }
    box.style.display = 'block';
    box.textContent = msg;
  }

  function _jsonp(url, cb){
    var cbName = '__cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    var done = false;
    console.log('URL usada:', url);
    var timer = setTimeout(function(){ if(done) return; done=true; cleanup(); cb(new Error('timeout')); }, 45000);
    function cleanup(){
      clearTimeout(timer);
      try{ delete window[cbName]; }catch(e){}
      if (s && s.parentNode) s.parentNode.removeChild(s);
    }
    window[cbName] = function(resp){
      if(done) return;
      done=true;
      cleanup();
      console.log('Resposta recebida:', resp);
      cb(null, resp);
    };
    var s = document.createElement('script');
    s.src = url + (url.indexOf('?')>=0?'&':'?') + 'callback=' + cbName + '&_ts=' + Date.now();
    s.onerror = function(){ if(done) return; done=true; cleanup(); cb(new Error('network')); };
    document.head.appendChild(s);
  }

  function _normalizeProjeto(p){
    var x = p || {};
    var consultor = x.consultor || x.consultor_nome || x.consultorNome || x.implantador || x.responsavel || x.responsável || '';
    var status = x.status || x.situacao || x.situação || '';
    var projetoLink = x.projeto_link || x.link_projeto || x.linkProjeto || x.url_projeto || x.urlProjeto || '';
    return Object.assign({}, x, {
      cliente: String(x.cliente || x.nome || x.projeto || '').trim(),
      consultor: String(consultor || '').trim(),
      status: String(status || '').trim(),
      projeto_link: String(projetoLink || '').trim(),
      mes: String(x.mes || '').trim()
    });
  }

  function loadAll(isRefresh){
    setError('');
    _jsonp(APPS_SCRIPT_URL + '?mes=ALL', function(err, resp){
      if (err) { setError('Erro ao carregar dados da planilha (falha de rede/timeout).'); return; }
      if (!resp || !Array.isArray(resp.projetos)) { setError('Erro ao carregar dados da planilha (resposta inválida).'); return; }
      if (!resp.projetos.length) { setError('Erro ao carregar dados da planilha (0 projetos retornados).'); return; }

      DATA.projetos = resp.projetos.map(_normalizeProjeto).filter(function(p){ return p.cliente; });
      console.log('DATA.projetos[0]:', DATA.projetos[0] || null);
      console.log('Consultor sample:', (DATA.projetos[0] && DATA.projetos[0].consultor) || '(vazio)');

      document.getElementById('navDate').textContent = 'Planilha: ' + new Date().toLocaleString('pt-BR');
      renderProjetos();
      _ckBuscar();
      if (isRefresh) console.log('Atualizado:', DATA.projetos.length);
    });
  }

  function renderProjetos(){
    var list = document.getElementById('projetosList');
    var total = DATA.projetos.length;
    var comCons = DATA.projetos.filter(function(p){ return p.consultor; }).length;
    var semCons = total - comCons;
    var comLink = DATA.projetos.filter(function(p){ return p.projeto_link; }).length;

    document.getElementById('kTotal').textContent = String(total);
    document.getElementById('kComCons').textContent = String(comCons);
    document.getElementById('kSemCons').textContent = String(semCons);
    document.getElementById('kComLink').textContent = String(comLink);

    if (!total) {
      list.innerHTML = '<div class="card"><div class="danger">Projetos 0</div><div class="muted">Sem dados da planilha.</div></div>';
      return;
    }

    list.innerHTML = DATA.projetos.map(function(p){
      var btn = p.projeto_link
        ? '<a class="open-btn" target="_blank" rel="noopener" href="'+escAttr(p.projeto_link)+'">Abrir Projeto</a>'
        : '';
      return '<div class="card">'
        + '<div class="row"><div><b>'+esc(p.cliente)+'</b></div>'+btn+'</div>'
        + '<div class="muted">Consultor: <b>'+(p.consultor?esc(p.consultor):'<span class="danger">SEM CONSULTOR</span>')+'</b></div>'
        + '<div class="muted">Status: '+esc(p.status||'-')+' • Vendedor: '+esc(p.vendedor||'-')+' • Mês: '+esc(p.mes||'-')+'</div>'
        + '</div>';
    }).join('');
  }

  function _ckListIdFrom(v){
    var s = String(v || '');
    var m = s.match(/\/v\/li\/(\d+)/i) || s.match(/(?:^|[^\d])(\d{8,})(?:[^\d]|$)/);
    return m ? String(m[1]) : '';
  }

  function _ckBuscar(){
    var ids = [];
    DATA.projetos.forEach(function(p){
      var id = _ckListIdFrom(p.projeto_link || p.clickup);
      if (id && ids.indexOf(id) === -1) ids.push(id);
    });
    if (!ids.length) { _ckCache = {}; renderMetricas(); return; }
    _jsonp(APPS_SCRIPT_URL + '?action=clickup&list_ids=' + encodeURIComponent(ids.join(',')), function(err, resp){
      if (err || !resp || !Array.isArray(resp.clickup)) {
        console.error('Erro ClickUp:', err, resp);
        _ckCache = {};
        renderMetricas();
        return;
      }
      _ckCache = {};
      resp.clickup.forEach(function(it){
        var id = _ckListIdFrom(it.listId || it.folderUrl || '');
        if (id) _ckCache[id] = it;
      });
      console.log('Retorno ClickUp:', resp);
      renderMetricas();
    });
  }

  function _riskOf(m){
    var score = 0, motivos = [];
    if (!m.hasData) { score += 70; motivos.push('Sem dados ClickUp'); }
    if (m.hasData && m.diasSemUpdate >= 14) { score += 50; motivos.push('Projeto parado ('+m.diasSemUpdate+'d)'); }
    if (m.hasData && !m.assignee) { score += 35; motivos.push('Sem dono'); }
    if (m.hasData && m.fasesPend > 0 && m.diasSemUpdate >= 7) { score += 25; motivos.push('Atraso/pêndencias'); }
    return { score: score, motivos: motivos };
  }

  function renderMetricas(){
    var rows = DATA.projetos.map(function(p){
      var id = _ckListIdFrom(p.projeto_link || p.clickup);
      var ck = id ? _ckCache[id] : null;
      var hasData = !!ck;
      var row = {
        cliente: p.cliente,
        assignee: hasData ? (ck.consultor || '-') : '-',
        progresso: hasData ? (ck.progresso || 0) : null,
        fasesDone: hasData ? (ck.fasesDone || 0) : 0,
        fasesPend: hasData ? (ck.fasesPend || 0) : 0,
        marcosDone: hasData ? (ck.marcosDone || 0) : 0,
        marcosPend: hasData ? (ck.marcosPend || 0) : 0,
        diasSemUpdate: hasData ? (ck.diasSemUpdate || 0) : null,
        hasData: hasData
      };
      row.risk = _riskOf(row);
      return row;
    });

    var top = rows.filter(function(r){ return r.risk.score > 0; }).sort(function(a,b){ return b.risk.score - a.risk.score; }).slice(0,8);
    document.getElementById('riscosList').innerHTML = top.length
      ? '<div class=\"card\"><b>Top riscos</b><div class=\"muted\" style=\"margin-top:6px\">'
        + top.map(function(r){ return '• ' + esc(r.cliente) + ' — ' + esc(r.risk.motivos.join(', ')); }).join('<br>')
        + '</div></div>'
      : '<div class=\"card\"><b>Top riscos</b><div class=\"muted\" style=\"margin-top:6px\">Sem riscos críticos no momento.</div></div>';

    document.getElementById('metricasList').innerHTML = rows.map(function(r){
      return '<div class=\"card\">'
        + '<div class=\"row\"><b>'+esc(r.cliente)+'</b><span class=\"small\">'+(r.hasData?('Progresso: '+esc(String(r.progresso))+'%'):'Sem dados CK')+'</span></div>'
        + '<div class=\"muted\">Tarefas: '+esc(String(r.fasesDone))+' concluídas / '+esc(String(r.fasesPend))+' pendentes</div>'
        + '<div class=\"muted\">Marcos: '+esc(String(r.marcosDone))+' concluídos / '+esc(String(r.marcosPend))+' pendentes</div>'
        + '<div class=\"muted\">Dias sem atualização: '+(r.diasSemUpdate===null?'-':esc(String(r.diasSemUpdate)))+' • Assignee recente: '+esc(r.assignee || '-')+'</div>'
        + '</div>';
    }).join('');
  }

  function esc(s){ return String(s||'').replace(/[&<>\"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function escAttr(s){ return esc(s).replace(/`/g,''); }

  loadAll(false);
  </script>
</body>
</html>
