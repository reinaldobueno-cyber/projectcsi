<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel PMO - Multsoft</title>
  <style>
    body{font-family:Inter,Arial,sans-serif;margin:0;background:#f4f7f5;color:#173b2d}
    header{background:#124d34;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
    .btn{background:#1f7a53;color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-weight:600}
    .wrap{max-width:1200px;margin:16px auto;padding:0 12px}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
    .kpi{background:#fff;border:1px solid #d9e5de;border-radius:10px;padding:12px}
    .kpi .n{font-size:24px;font-weight:800}
    .tabs{display:flex;gap:8px;margin:8px 0 12px}
    .tab{padding:8px 12px;border:1px solid #bdd2c8;border-radius:8px;background:#fff;cursor:pointer;font-weight:600}
    .tab.on{background:#124d34;color:#fff;border-color:#124d34}
    .panel{display:none}
    .panel.on{display:block}
    .card{background:#fff;border:1px solid #d9e5de;border-radius:10px;padding:10px 12px;margin-bottom:8px}
    .muted{color:#6b7d74;font-size:12px}
    .danger{color:#b42318;font-weight:700}
    .ok{color:#1a7f37;font-weight:700}
    .row{display:flex;justify-content:space-between;gap:10px;align-items:center}
    .small{font-size:12px}
    a.link{color:#124d34;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <header>
    <div><b>PAINEL PMO</b> - MULTSOFT</div>
    <div>
      <span id="navDate" class="small" style="margin-right:8px">-</span>
      <button class="btn" onclick="loadAll(true)">Atualizar</button>
    </div>
  </header>

  <div class="wrap">
    <div class="kpis">
      <div class="kpi"><div class="muted">Projetos</div><div id="kTotal" class="n">0</div></div>
      <div class="kpi"><div class="muted">Com consultor</div><div id="kComCons" class="n">0</div></div>
      <div class="kpi"><div class="muted">Sem consultor</div><div id="kSemCons" class="n">0</div></div>
      <div class="kpi"><div class="muted">Com dados CK</div><div id="kComCk" class="n">0</div></div>
    </div>

    <div class="tabs">
      <button id="tProjetos" class="tab on" onclick="showTab('projetos')">Projetos</button>
      <button id="tClickup" class="tab" onclick="showTab('clickup')">ClickUp</button>
    </div>

    <section id="pProjetos" class="panel on">
      <div id="projetosList"></div>
    </section>

    <section id="pClickup" class="panel">
      <div style="margin-bottom:10px">
        <button class="btn" onclick="_ckBuscar()">Buscar dados do ClickUp</button>
      </div>
      <div id="ckList"></div>
    </section>
  </div>

  <script>
  // configuração global
  var APPS_SCRIPT_URL_DEFAULT = 'https://script.google.com/macros/s/AKfycby3OimL5C68K40B7lt6iMHjIrDUhhXBmeM3FLZMOzHf2evn-q-_2kIDzprls44N_vjJ/exec';
  var APPS_SCRIPT_URL = (function(){
    try {
      var p = new URLSearchParams(window.location.search).get('apps_script_url');
      return p || APPS_SCRIPT_URL_DEFAULT;
    } catch(e){ return APPS_SCRIPT_URL_DEFAULT; }
  })();

  // DATA
  var DATA = { projetos: [] };
  var _ckCache = {};

  function showTab(tab){
    document.getElementById('pProjetos').classList.toggle('on', tab==='projetos');
    document.getElementById('pClickup').classList.toggle('on', tab==='clickup');
    document.getElementById('tProjetos').classList.toggle('on', tab==='projetos');
    document.getElementById('tClickup').classList.toggle('on', tab==='clickup');
  }

  function _jsonp(url, cb){
    var cbName = '__cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    var done = false;
    var timer = setTimeout(function(){ if(done) return; done=true; cleanup(); cb(new Error('timeout')); }, 45000);
    function cleanup(){
      clearTimeout(timer);
      try{ delete window[cbName]; }catch(e){}
      if (s && s.parentNode) s.parentNode.removeChild(s);
    }
    window[cbName] = function(resp){ if(done) return; done=true; cleanup(); cb(null, resp); };
    var s = document.createElement('script');
    s.src = url + (url.indexOf('?')>=0?'&':'?') + 'callback=' + cbName + '&_ts=' + Date.now();
    s.onerror = function(){ if(done) return; done=true; cleanup(); cb(new Error('network')); };
    document.head.appendChild(s);
  }

  function _normalizeProjeto(p){
    var x = p || {};
    var consultor = x.consultor || x.consultor_nome || x.consultorNome || x.implantador || x.responsavel || x.responsável || '';
    var clickup = x.clickup || x.projeto_clickup || x.projetoClickup || x.clickup_url || x.clickupUrl || '';
    var status = x.status || x.situacao || x.situação || '';
    return Object.assign({}, x, {
      cliente: String(x.cliente || x.nome || x.projeto || '').trim(),
      consultor: String(consultor || '').trim(),
      clickup: String(clickup || '').trim(),
      status: String(status || '').trim(),
      mes: String(x.mes || '').trim()
    });
  }

  // loadAll()
  function loadAll(isRefresh){
    _jsonp(APPS_SCRIPT_URL + '?mes=ALL', function(err, resp){
      if (err || !resp || !resp.projetos) {
        console.error('[PMO] erro ao carregar planilha', err, resp);
        DATA.projetos = [];
        renderProjetos();
        _renderCk();
        return;
      }
      DATA.projetos = (resp.projetos || []).map(_normalizeProjeto).filter(function(p){ return p.cliente; });
      var ex = DATA.projetos[0] || {};
      console.info('[PMO] DATA.projetos[0]', ex);
      console.info('[PMO] consultor sample', ex.consultor || '(vazio)');
      document.getElementById('navDate').textContent = 'Planilha: ' + new Date().toLocaleString('pt-BR');
      renderProjetos();
      _renderCk();
      if (isRefresh) console.info('[PMO] atualizado', DATA.projetos.length);
    });
  }

  // renderização de projetos
  function renderProjetos(){
    var list = document.getElementById('projetosList');
    var total = DATA.projetos.length;
    var comCons = DATA.projetos.filter(function(p){ return p.consultor; }).length;
    var semCons = total - comCons;
    document.getElementById('kTotal').textContent = String(total);
    document.getElementById('kComCons').textContent = String(comCons);
    document.getElementById('kSemCons').textContent = String(semCons);

    if (!total){
      list.innerHTML = '<div class="card"><div class="danger">Projetos 0</div><div class="muted">Sem dados da planilha.</div></div>';
      return;
    }

    list.innerHTML = DATA.projetos.map(function(p){
      return '<div class="card">'
        + '<div class="row"><div><b>'+esc(p.cliente)+'</b></div><div class="small">'+esc(p.mes||'-')+'</div></div>'
        + '<div class="muted">Consultor: <b>'+(p.consultor?esc(p.consultor):'<span class="danger">SEM CONSULTOR</span>')+'</b></div>'
        + '<div class="muted">Status: '+esc(p.status||'-')+' • Vendedor: '+esc(p.vendedor||'-')+'</div>'
        + '</div>';
    }).join('');
  }

  // integração ClickUp
  function _ckListIdFrom(v){
    var s = String(v || '');
    var m = s.match(/\/v\/li\/(\d+)/i) || s.match(/(?:^|[^\d])(\d{8,})(?:[^\d]|$)/);
    return m ? String(m[1]) : '';
  }

  function _ckBuscar(){
    var ids = [];
    DATA.projetos.forEach(function(p){
      var id = _ckListIdFrom(p.clickup);
      if (id && ids.indexOf(id) === -1) ids.push(id);
    });
    var qs = ids.length ? ('&list_ids=' + encodeURIComponent(ids.join(','))) : '';
    _jsonp(APPS_SCRIPT_URL + '?action=clickup' + qs, function(err, resp){
      if (err || !resp || !resp.clickup){
        console.error('[PMO] erro clickup', err, resp);
        _ckCache = {};
        _renderCk();
        return;
      }
      _ckCache = {};
      (resp.clickup || []).forEach(function(it){
        var key = _ckListIdFrom(it.listId || it.folderUrl || '');
        if (key) _ckCache[key] = it;
      });
      console.info('[PMO] retorno clickup', resp);
      console.info('[PMO] _ckCache size', Object.keys(_ckCache).length);
      _renderCk(resp.clickup || []);
    });
  }

  // renderização ClickUp
  function _renderCk(ckList){
    var wrap = document.getElementById('ckList');
    var list = ckList || [];
    if (!list.length) {
      // tenta casar via cache com projetos
      var matched = 0;
      DATA.projetos.forEach(function(p){ if (_ckCache[_ckListIdFrom(p.clickup)]) matched++; });
      document.getElementById('kComCk').textContent = String(matched);
      wrap.innerHTML = '<div class="card"><div class="muted">Sem dados CK carregados.</div></div>';
      return;
    }

    var matchedCount = 0;
    DATA.projetos.forEach(function(p){ if (_ckCache[_ckListIdFrom(p.clickup)]) matchedCount++; });
    document.getElementById('kComCk').textContent = String(matchedCount);

    wrap.innerHTML = list.map(function(it){
      var url = it.folderUrl || it.url || '';
      return '<div class="card">'
        + '<div class="row"><div><b>'+esc(it.cliente || it.nome || 'Projeto CK')+'</b></div>'
        + '<div class="small">'+esc(String(it.progresso||0))+'%</div></div>'
        + '<div class="muted">Consultor CK: '+esc(it.consultor || '-')+'</div>'
        + '<div class="muted">Fases: '+esc(String(it.fasesDone||0))+'/'+esc(String(it.totalFases||0))+'</div>'
        + (url?'<div><a class="link" target="_blank" href="'+escAttr(url)+'">Abrir no ClickUp</a></div>':'')
        + '</div>';
    }).join('');
  }
  _ckCache = {};
  _ckByListId = {};
  var idsPlanilha = [];
  (DATA.projetos || []).forEach(function(p){
    var id = _ckListIdFrom(p && p.clickup);
    if (id && idsPlanilha.indexOf(id) === -1) idsPlanilha.push(id);
  });
  var idsQs = idsPlanilha.length ? ('&list_ids=' + encodeURIComponent(idsPlanilha.join(','))) : '';

  function tentarCK(attempt){
    var done=false, cbName='_ckCb'+Date.now()+'_'+attempt;
    var timer=setTimeout(function(){
      if(done) return; done=true; _limparCkJsonp(cbName);
      if (attempt < CLICKUP_MAX_RETRIES) {
        showToast('ClickUp lento, tentando novamente... ('+(attempt+2)+'/'+(CLICKUP_MAX_RETRIES+1)+')','err');
        console.warn('[PMO] Timeout ClickUp tentativa', attempt + 1, 'de', CLICKUP_MAX_RETRIES + 1);
        tentarCK(attempt+1);
      } else {
        console.error('[PMO] Timeout final ClickUp apos', CLICKUP_MAX_RETRIES + 1, 'tentativas');
        showToast('Timeout \u2014 Apps Script demorou mais de '+Math.round(CLICKUP_TIMEOUT_MS/1000)+'s','err');
        _renderCk(filteredProj());
      }
    },CLICKUP_TIMEOUT_MS);

  // util
  function esc(s){ return String(s||'').replace(/[&<>\"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function escAttr(s){ return esc(s).replace(/`/g,''); }

  // inicialização
  loadAll(false);
  </script>
</body>
</html>
